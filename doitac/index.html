<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký đối tác kinh doanh</title>

<style>
body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:20px;
}

h2{
text-align:center;
color:#c40000;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:8px;
text-align:center;
}

button{
padding:10px 15px;
margin-top:10px;
background:#c40000;
color:white;
border:none;
cursor:pointer;
}
</style>

<script>

function tinhTien(row){
let sl=row.querySelector(".soluong").value
let dg=row.querySelector(".dongia").value
row.querySelector(".thanhtien").value=sl*dg
}

function themDong(){

let table=document.getElementById("bangsp")

let row=table.insertRow()

row.innerHTML=`
<td><input name="ten_sp[]"></td>
<td><input name="trongluong[]"></td>
<td><input type="number" class="soluong" name="soluong[]" onkeyup="tinhTien(this.parentElement.parentElement)"></td>
<td><input type="number" class="dongia" name="dongia[]" onkeyup="tinhTien(this.parentElement.parentElement)"></td>
<td><input class="thanhtien" name="thanhtien[]" readonly></td>
<td><input name="tygia_pi[]"></td>
`

}

</script>

</head>

<body>

<h2>FORM ĐĂNG KÝ ĐỐI TÁC KINH DOANH</h2>

<form action="https://formspree.io/f/yourID" method="POST">

<label>Họ và tên</label>
<input type="text" name="hoten" required>

<label>Địa chỉ</label>
<input type="text" name="diachi">

<label>Số điện thoại</label>
<input type="text" name="sdt">

<label>Số căn cước công dân</label>
<input type="text" name="cccd">

<label>Ngày cấp</label>
<input type="date" name="ngaycap">

<label>Nơi cấp</label>
<input type="text" name="noicap">

<label>Email</label>
<input type="email" name="email">

<label>Địa chỉ ví Pi</label>
<input type="text" name="pi">

<label>Số tài khoản ngân hàng</label>
<input type="text" name="stk">

<label>Ngân hàng</label>
<select name="nganhang">

<option>Vietcombank</option>
<option>BIDV</option>
<option>VietinBank</option>
<option>Agribank</option>
<option>Techcombank</option>
<option>MB Bank</option>
<option>ACB</option>
<option>Sacombank</option>
<option>VPBank</option>
<option>TPBank</option>
<option>SHB</option>

</select>

<h3>Mặt hàng đăng ký bán</h3>

<table>

<thead>
<tr>
<th>Tên sản phẩm</th>
<th>Trọng lượng</th>
<th>Số lượng</th>
<th>Đơn giá</th>
<th>Thành tiền</th>
<th>Tỷ giá Pi</th>
</tr>
</thead>

<tbody id="bangsp">

<tr>
<td><input name="ten_sp[]"></td>
<td><input name="trongluong[]"></td>
<td><input type="number" class="soluong" name="soluong[]" onkeyup="tinhTien(this.parentElement.parentElement)"></td>
<td><input type="number" class="dongia" name="dongia[]" onkeyup="tinhTien(this.parentElement.parentElement)"></td>
<td><input class="thanhtien" name="thanhtien[]" readonly></td>
<td><input name="tygia_pi[]"></td>
</tr>

</tbody>

</table>

<button type="button" onclick="themDong()">Thêm dòng sản phẩm</button>

<label>Chiết khấu cho chủ shop</label>

<select name="chietkhau">

<option>Chiết khấu theo số tiền trên đơn</option>
<option>Chiết khấu theo % doanh thu tháng</option>

</select>

<label>Ghi rõ mức chiết khấu</label>
<input type="text" name="mucchietkhau">

<input type="hidden" name="_cc" value="">

<br>

<button type="submit">Gửi đăng ký</button>

</form>

</body>
</html>
