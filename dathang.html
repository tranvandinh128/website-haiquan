<h2>Đặt Hàng</h2>

<form action="https://formspree.io/f/xrbpbyaj" method="POST">

<label>Họ và tên:</label><br>
<input type="text" name="ten_khach" required><br><br>

<label>Số điện thoại:</label><br>
<input type="tel" name="so_dien_thoai" required><br><br>

<label>Địa chỉ giao hàng:</label><br>
<textarea name="dia_chi" required></textarea><br><br>

<label>Sản phẩm:</label><br>
<select id="sanpham" name="san_pham" onchange="tinhTien()">
<option value="38000">Mắm Ruốc Biển (250g)</option>
<option value="50000">Nhân Lạc Đỏ</option>
<option value="120000">Nước Mắm Truyền Thống</option>
</select><br><br>

<label>Đơn giá:</label><br>
<input type="text" id="dongia" name="don_gia" readonly><br><br>

<label>Số lượng:</label><br>
<input type="number" id="soluong" name="so_luong" value="1" onchange="tinhTien()"><br><br>

<label>Thành tiền:</label><br>
<input type="text" id="thanhtien" name="thanh_tien" readonly><br><br>

<label>Thanh toán:</label><br>
<select name="thanh_toan">
<option>COD - Thanh toán khi nhận hàng</option>
<option>Chuyển khoản</option>
<option>Thanh toán Pi</option>
</select><br><br>

<label>Ghi chú:</label><br>
<textarea name="ghi_chu"></textarea><br><br>

<input type="hidden" name="_subject" value="Đơn hàng mới từ website">

<button type="submit">Gửi đơn hàng</button>

</form>


<script>

function tinhTien() {

var sanpham = document.getElementById("sanpham");
var dongia = sanpham.value;

var soluong = document.getElementById("soluong").value;

var thanhtien = dongia * soluong;

document.getElementById("dongia").value = Number(dongia).toLocaleString() + " đ";

document.getElementById("thanhtien").value = Number(thanhtien).toLocaleString() + " đ";

}

tinhTien();

</script>
<form action="https://formspree.io/f/xrbpbyaj" method="POST">

<h2>Đặt Hàng</h2>

<label>Họ và tên</label><br>
<input type="text" name="ten"><br><br>

<label>Số điện thoại</label><br>
<input type="text" name="sdt"><br><br>

<label>Địa chỉ giao hàng</label><br>
<textarea name="diachi"></textarea><br><br>

<label>Sản phẩm</label><br>
<input type="text" name="sanpham"><br><br>

<label>Số lượng</label><br>
<input type="number" name="soluong"><br><br>

<label>Đơn giá</label><br>
<input type="text" name="dongia"><br><br>

<label>Thành tiền</label><br>
<input type="text" name="thanhtien"><br><br>

<button type="submit">Gửi đơn hàng</button>

</form>
