<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt hàng - Mắm Hải Quân</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#0b5ed7;
color:white;
text-align:center;
padding:20px;
}

form{
background:white;
max-width:500px;
margin:40px auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<header>

<h1>Mắm Hải Quân</h1>
<p>Đậm vị biển – Trọn tình quê</p>

</header>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<h2>Thông tin đặt hàng</h2>

<label>Tên khách hàng</label>
<input type="text" name="ten_khach_hang" required>

<label>Số điện thoại</label>
<input type="tel" name="so_dien_thoai" required>

<label>Địa chỉ giao hàng</label>
<input type="text" name="dia_chi" required>

<label>Sản phẩm</label>
<select name="san_pham">

<option>Mắm tôm</option>
<option>Mắm cá</option>
<option>Mắm ruốc</option>
<option>Mắm nêm</option>
<option>Tôm khô</option>
<option>Mực khô</option>

</select>

<label>Số lượng</label>
<input type="number" name="so_luong" value="1">

<label>Ghi chú</label>
<textarea name="ghi_chu"></textarea>

<button type="submit">

Xác nhận đặt hàng

</button>

</form>

</body>
</html>
