<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký đối tác kinh doanh</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:#fff;
padding:20px;
border-radius:8px;
max-width:900px;
margin:auto;
}

h2{
text-align:center;
color:#c40000;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:8px;
text-align:center;
}

button{
padding:10px 15px;
background:#c40000;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#900000;
}

</style>

<script>

function themDong(){
var table=document.getElementById("sanpham");
var row=table.insertRow(-1);

for(var i=0;i<6;i++){
var cell=row.insertCell(i);

if(i==0){
cell.innerHTML="<input name='ten_sp[]'>";
}

if(i==1){
cell.innerHTML="<input name='trong_luong[]'>";
}

if(i==2){
cell.innerHTML="<input type='number' name='so_luong[]' oninput='tinhTien(this)'>";
}

if(i==3){
cell.innerHTML="<input type='number' name='don_gia[]' oninput='tinhTien(this)'>";
}

if(i==4){
cell.innerHTML="<input name='thanh_tien[]' readonly>";
}

if(i==5){
cell.innerHTML="<input name='ty_gia_pi[]'>";
}

}

}

function tinhTien(el){

var row=el.parentNode.parentNode;

var sl=row.cells[2].children[0].value;
var dg=row.cells[3].children[0].value;

var tt=sl*dg;

row.cells[4].children[0].value=tt;

}

</script>

</head>

<body>

<div class="container">

<h2>FORM ĐĂNG KÝ ĐỐI TÁC KINH DOANH</h2>

<form action="https://formspree.io/f/yourID" method="POST">

<input type="hidden" name="_cc" value="">
<input type="hidden" name="_subject" value="Đăng ký đối tác kinh doanh">

<label>Họ và tên</label>
<input type="text" name="ho_ten" required>

<label>Địa chỉ</label>
<input type="text" name="dia_chi">

<label>Số điện thoại</label>
<input type="text" name="dien_thoai">

<label>Số căn cước công dân</label>
<input type="text" name="cccd">

<label>Ngày cấp</label>
<input type="date" name="ngay_cap">

<label>Nơi cấp</label>
<input type="text" name="noi_cap">

<label>Email</label>
<input type="email" name="email" required 
onchange="document.querySelector('input[name=_cc]').value=this.value">

<label>Địa chỉ ví PI</label>
<input type="text" name="vi_pi">

<label>Số tài khoản ngân hàng</label>
<input type="text" name="stk">

<label>Ngân hàng</label>

<select name="ngan_hang">

<option>Vietcombank</option>
<option>Vietinbank</option>
<option>BIDV</option>
<option>Agribank</option>
<option>MB Bank</option>
<option>Techcombank</option>
<option>ACB</option>
<option>Sacombank</option>
<option>VPBank</option>
<option>TPBank</option>
<option>SHB</option>
<option>OCB</option>
<option>Eximbank</option>
<option>SeABank</option>
<option>VIB</option>

</select>

<h3>Mặt hàng đăng ký bán</h3>

<table id="sanpham">

<tr>
<th>Tên sản phẩm</th>
<th>Trọng lượng</th>
<th>Số lượng</th>
<th>Đơn giá</th>
<th>Thành tiền</th>
<th>Tỷ giá Pi</th>
</tr>

<tr>
<td><input name="ten_sp[]"></td>
<td><input name="trong_luong[]"></td>
<td><input type="number" name="so_luong[]" oninput="tinhTien(this)"></td>
<td><input type="number" name="don_gia[]" oninput="tinhTien(this)"></td>
<td><input name="thanh_tien[]" readonly></td>
<td><input name="ty_gia_pi[]"></td>
</tr>

<tr>
<td><input name="ten_sp[]"></td>
<td><input name="trong_luong[]"></td>
<td><input type="number" name="so_luong[]" oninput="tinhTien(this)"></td>
<td><input type="number" name="don_gia[]" oninput="tinhTien(this)"></td>
<td><input name="thanh_tien[]" readonly></td>
<td><input name="ty_gia_pi[]"></td>
</tr>

<tr>
<td><input name="ten_sp[]"></td>
<td><input name="trong_luong[]"></td>
<td><input type="number" name="so_luong[]" oninput="tinhTien(this)"></td>
<td><input type="number" name="don_gia[]" oninput="tinhTien(this)"></td>
<td><input name="thanh_tien[]" readonly></td>
<td><input name="ty_gia_pi[]"></td>
</tr>

<tr>
<td><input name="ten_sp[]"></td>
<td><input name="trong_luong[]"></td>
<td><input type="number" name="so_luong[]" oninput="tinhTien(this)"></td>
<td><input type="number" name="don_gia[]" oninput="tinhTien(this)"></td>
<td><input name="thanh_tien[]" readonly></td>
<td><input name="ty_gia_pi[]"></td>
</tr>

<tr>
<td><input name="ten_sp[]"></td>
<td><input name="trong_luong[]"></td>
<td><input type="number" name="so_luong[]" oninput="tinhTien(this)"></td>
<td><input type="number" name="don_gia[]" oninput="tinhTien(this)"></td>
<td><input name="thanh_tien[]" readonly></td>
<td><input name="ty_gia_pi[]"></td>
</tr>

</table>

<button type="button" onclick="themDong()">Thêm sản phẩm</button>

<h3>Chiết khấu cho chủ shop</h3>

<select name="chiet_khau">

<option>Chiết khấu theo số tiền trên đơn</option>
<option>% tổng doanh thu theo tháng</option>

</select>

<input type="text" name="gia_tri_chiet_khau" placeholder="Nhập giá trị chiết khấu">

<br>

<button type="submit">Gửi đăng ký</button>

</form>

</div>

</body>
</html>
